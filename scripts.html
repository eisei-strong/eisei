<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>切り返し・褒めテンプレ</title>
<style>
:root{--gold:#c9a84c;--gold-light:#d4b55a;--gold-dim:rgba(201,168,76,.1);--bg:#fff;--bg2:#f8f9fa;--bg3:#f0f1f3;--border:#e0e0e0;--text:#1a1a1a;--text2:#666;--text3:#999;--radius:12px;--radius-sm:8px;--shadow:0 1px 3px rgba(0,0,0,.08);--tr:.2s cubic-bezier(.4,0,.2,1)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);line-height:1.7;-webkit-font-smoothing:antialiased}
header{position:fixed;top:0;left:0;right:0;height:56px;background:rgba(255,255,255,.95);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);z-index:100;display:flex;align-items:center;padding:0 24px}
.header-inner{max-width:960px;width:100%;margin:0 auto;display:flex;align-items:center;gap:16px}
.header-title{font-size:15px;font-weight:700;color:var(--gold);letter-spacing:.5px;flex-shrink:0}
.header-search{position:relative;flex:1;max-width:300px;margin-left:auto}
.header-search input{width:100%;padding:7px 12px 7px 32px;background:var(--bg2);border:1px solid var(--border);border-radius:20px;color:var(--text);font-size:12px;outline:none}
.header-search input:focus{border-color:var(--gold)}
.header-search::before{content:'\1F50D';position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:12px;pointer-events:none}
.user-area{display:flex;align-items:center;gap:8px;flex-shrink:0;margin-left:8px}
.user-name{font-size:12px;color:var(--gold);font-weight:600}
.user-btn{background:none;border:1px solid var(--border);color:var(--text3);font-size:10px;padding:3px 8px;border-radius:12px;cursor:pointer}
.user-btn:hover{border-color:var(--gold);color:var(--gold)}
main{max-width:960px;margin:0 auto;padding:80px 24px 80px}
.page-nav{display:flex;gap:0;margin-bottom:24px;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;background:var(--bg2)}
.page-nav a{flex:1;text-align:center;padding:12px 16px;font-size:13px;font-weight:600;color:var(--text2);text-decoration:none;border-right:1px solid var(--border)}
.page-nav a:last-child{border-right:none}
.page-nav a:hover{background:var(--gold-dim);color:var(--gold)}
.page-nav a.active{background:var(--gold);color:#fff}
.section-title{font-size:18px;font-weight:700;margin-bottom:20px;padding-bottom:14px;border-bottom:2px solid var(--border)}
.kiri-group{margin-bottom:20px;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;background:var(--bg);box-shadow:var(--shadow)}
.kiri-group-hdr{padding:14px 20px;font-size:14px;font-weight:800;color:var(--gold);background:var(--bg2);border-bottom:1px solid var(--border);cursor:pointer;display:flex;align-items:center;gap:10px;user-select:none}
.kiri-group-hdr .cnt{font-size:11px;font-weight:400;color:var(--text3);margin-left:auto}
.kiri-group-hdr .chevron{font-size:12px;color:var(--text3);transition:transform .2s}
.kiri-group.collapsed .chevron{transform:rotate(-90deg)}
.kiri-group.collapsed .kiri-group-body{display:none}
.kiri-item{padding:16px 20px 16px 24px;border-bottom:1px solid var(--border)}
.kiri-item:last-child{border-bottom:none}
.kiri-item-title{font-size:14px;font-weight:600;color:var(--text);margin-bottom:8px;cursor:pointer;display:flex;align-items:center;gap:8px}
.kiri-item-title .arrow{font-size:12px;color:var(--gold);transition:transform .2s;flex-shrink:0}
.kiri-item.open .arrow{transform:rotate(90deg)}
.kiri-item-body{display:none}
.kiri-item.open .kiri-item-body{display:block}
.kiri-script{font-size:13px;color:var(--text2);line-height:1.9;white-space:pre-wrap;background:var(--bg2);border:1px solid var(--border);border-left:3px solid var(--gold);border-radius:var(--radius-sm);padding:16px 18px;margin-top:8px}
.kiri-actions{display:flex;align-items:center;gap:12px;margin-top:12px;flex-wrap:wrap}
.memorized-btn{padding:8px 20px;border:2px solid var(--gold);border-radius:20px;background:none;color:var(--gold);font-size:13px;font-weight:700;cursor:pointer}
.memorized-btn:hover{background:var(--gold-dim)}
.memorized-btn.done{background:var(--gold);color:#fff}
.loom-area{display:flex;align-items:center;gap:8px;flex:1;min-width:200px}
.loom-input{flex:1;padding:8px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:12px;outline:none;background:var(--bg2);color:var(--text)}
.loom-input:focus{border-color:var(--gold)}
.loom-submit{padding:8px 16px;background:var(--gold);color:#fff;border:none;border-radius:var(--radius-sm);font-size:12px;font-weight:700;cursor:pointer}
.loom-submitted{font-size:12px;color:#4CAF50;font-weight:600}
.home-item{padding:16px 20px;border-bottom:1px solid var(--border);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:12px;background:var(--bg)}
.home-item-title{font-size:14px;font-weight:700;color:var(--text);margin-bottom:8px}
.home-item-desc{font-size:13px;color:var(--text2);line-height:1.9;white-space:pre-wrap;background:var(--bg2);border:1px solid var(--border);border-left:3px solid var(--gold);border-radius:var(--radius-sm);padding:16px 18px}
.home-item-link{display:inline-flex;align-items:center;gap:6px;margin-top:10px;padding:8px 16px;background:var(--gold-dim);border:1px solid var(--gold);color:var(--gold);border-radius:var(--radius-sm);font-size:13px;font-weight:600;text-decoration:none}
.home-item-link:hover{background:var(--gold);color:#fff}
.report-box{margin-bottom:24px;padding:20px;background:linear-gradient(135deg,rgba(232,93,93,.04),#fff);border:1px solid rgba(232,93,93,.2);border-radius:var(--radius)}
.report-box.blue{border-color:rgba(37,99,235,.2);background:linear-gradient(135deg,rgba(37,99,235,.04),#fff)}
.report-title{font-size:15px;font-weight:700;color:#e85d5d;margin-bottom:14px}
.report-title.blue{color:#2563EB}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:6px}
.field input{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:13px;background:var(--bg2);color:var(--text);outline:none}
.field input:focus{border-color:var(--gold)}
.submit-btn{padding:10px 24px;background:linear-gradient(135deg,#e85d5d,#d44);color:#fff;border:none;border-radius:var(--radius-sm);font-size:14px;font-weight:700;cursor:pointer}
.submit-btn:hover{opacity:.9}
.submit-btn:disabled{opacity:.5}
.submit-btn.blue{background:linear-gradient(135deg,#2563EB,#1D4ED8)}
.result-box{margin-top:14px;padding:16px;border-radius:var(--radius-sm);font-size:13px;line-height:1.7;white-space:pre-wrap;background:rgba(255,152,0,.06);border:1px solid rgba(255,152,0,.2);border-left:3px solid #FF9800}
.result-label{font-size:11px;font-weight:700;color:#FF9800;margin-bottom:8px}
.reports-header{font-size:15px;font-weight:800;color:var(--text);margin:24px 0 14px;padding-bottom:8px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.reports-count{font-size:12px;font-weight:400;color:var(--text3);background:var(--bg2);padding:2px 10px;border-radius:10px}
.report-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px 18px;margin-bottom:12px}
.report-card-name{font-weight:800;color:var(--gold);font-size:14px}
.report-card-time{color:var(--text3);font-size:12px;margin-left:8px}
.report-card-q{font-size:14px;color:var(--text);line-height:1.6;white-space:pre-wrap;margin:8px 0}
.report-card-a{font-size:13px;color:var(--text2);line-height:1.7;white-space:pre-wrap;padding:12px 14px;border-radius:var(--radius-sm);border-left:3px solid}
.report-card-a.ai{background:rgba(255,152,0,.06);border-left-color:#FF9800}
.report-card-a.coach{background:rgba(37,99,235,.06);border-left-color:#2563EB}
.report-card-a-label{font-size:11px;font-weight:700;margin-bottom:6px}
.report-card-a-label.ai{color:#FF9800}
.report-card-a-label.coach{color:#2563EB}
.kiri-report-item{padding:14px 20px 14px 24px;border-bottom:1px solid var(--border);border-left:4px solid}
.kiri-report-item.coach-done{border-left-color:#4CAF50;background:rgba(76,175,80,.04)}
.kiri-report-item.ai-only{border-left-color:#FF9800;background:rgba(255,152,0,.04)}
.kiri-report-meta{display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:11px}
.kiri-report-badge{padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700}
.kiri-report-badge.coach{background:#4CAF50;color:#fff}
.kiri-report-badge.ai{background:#FF9800;color:#fff}
.kiri-report-user{font-weight:700;color:var(--text2)}
.kiri-report-time{color:var(--text3)}
.knowledge-header{margin-top:24px;padding-bottom:8px;border-bottom:2px solid var(--border);margin-bottom:16px;display:flex;align-items:center;gap:10px}
.knowledge-header span:first-child{font-size:16px;font-weight:800;color:var(--gold)}
.login-overlay{position:fixed;inset:0;background:rgba(255,255,255,.95);backdrop-filter:blur(12px);z-index:300;display:flex;align-items:center;justify-content:center;padding:20px}
.login-box{background:var(--bg);border:1px solid var(--border);border-radius:16px;padding:40px 36px;width:100%;max-width:420px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.08)}
.login-box h2{color:var(--gold);font-size:20px;margin-bottom:8px}
.login-box p{color:var(--text3);font-size:13px;margin-bottom:24px}
.login-box input{width:100%;padding:12px 16px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:15px;outline:none;text-align:center;margin-bottom:12px}
.login-box input:focus{border-color:var(--gold)}
.login-btn{width:100%;padding:12px;background:linear-gradient(135deg,var(--gold),var(--gold-light));color:#fff;border:none;border-radius:var(--radius-sm);font-size:15px;font-weight:700;cursor:pointer;margin-top:4px}
.login-btn:hover{filter:brightness(1.1)}
.login-error{color:#e85d5d;font-size:12px;margin-top:8px;display:none}
.login-toggle{margin-top:16px;font-size:12px;color:var(--text3)}
.login-toggle a{color:var(--gold);cursor:pointer;text-decoration:underline;font-weight:600}
#searchResults{display:none;margin-bottom:20px;padding:16px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius)}
@media(max-width:768px){
main{padding:72px 12px 80px}
.header-search{display:none}
.user-area{margin-left:auto}
}
</style>
</head>
<body>

<div class="login-overlay" id="loginOverlay" style="display:none">
<div class="login-box">
<h2>30日間で300万円を着金する講座</h2>
<p id="loginDesc">IDとパスワードを入力してログイン</p>
<input type="text" id="loginUserId" placeholder="ユーザーIDを入力...">
<input type="text" id="loginName" placeholder="名前を入力..." style="display:none">
<input type="password" id="loginPass" placeholder="パスワードを入力...">
<button class="login-btn" onclick="doLogin()">ログイン</button>
<div class="login-error" id="loginErr"></div>
<div class="login-toggle"><span id="loginToggleText">はじめての方は <a onclick="toggleMode()">新規登録</a></span></div>
</div>
</div>

<header>
<div class="header-inner">
<div class="header-title">📜 切り返し・褒めテンプレ</div>
<div class="header-search"><input type="text" id="searchInput" placeholder="キーワードで検索..." oninput="doSearch(this.value)"></div>
<div class="user-area">
<span class="user-name" id="userName">未ログイン</span>
<button class="user-btn" id="userBtn" onclick="showLogin()">ログイン</button>
</div>
</div>
</header>

<main>
<div class="page-nav">
<a href="/30day/">📋 全ステップ</a>
<a href="#kiri" id="navKiri" class="active" onclick="switchTab('kiri');return false;">📜 切り返しテンプレ</a>
<a href="#home" id="navHome" onclick="switchTab('home');return false;">⭐ 褒めテンプレ</a>
</div>

<div id="searchResults"></div>

<div id="kiriSection">
<div class="section-title">📜 切り返しテンプレ</div>

<div class="report-box">
<div class="report-title">切り返せなかった質問を超具体的に報告する</div>
<div class="field"><label>「〜です」と言われた内容</label><input id="rptContent" placeholder="例: 副業禁止なんですけど..."></div>
<div class="field"><label>商談動画のURL</label><input id="rptUrl" placeholder="https://www.loom.com/share/..."></div>
<div class="field"><label>該当部分（何分頃か等）</label><input id="rptPart" placeholder="例: 12:30あたり"></div>
<button class="submit-btn" id="rptBtn" onclick="submitReport()">送信</button>
<div id="rptResult" style="display:none"></div>
</div>


<div class="knowledge-header">
<span>📖 切り返しナレッジ</span>
<span class="reports-count" id="kiriCount"></span>
</div>
<div id="kiriList"></div>

<div class="report-box blue" style="margin-top:32px">
<div class="report-title blue">事務系の質問を具体的に報告する</div>
<div class="field"><label>質問内容</label><input id="jimuContent" placeholder="例: 契約書のテンプレートはどこにありますか？"></div>
<div class="field"><label>どの場面で困ったか</label><input id="jimuScene" placeholder="例: 商談後の契約手続き中"></div>
<button class="submit-btn blue" id="jimuBtn" onclick="submitJimu()">送信</button>
<div id="jimuResult" style="display:none"></div>
</div>
</div>

<div id="homeSection" style="display:none">
<div class="section-title">⭐ 褒めテンプレ</div>
<div id="homeList"></div>
</div>
</main>

<script>
var STORE_USER = '30day_user';
var STORE_USER_ID = '30day_user_id';
var currentUser = localStorage.getItem(STORE_USER) || null;
var currentUserId = localStorage.getItem(STORE_USER_ID) || null;
var loginMode = 'login';
var allKiriSteps = [];
var allHomeSteps = [];
var kiriReports = [];

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function showLogin() {
  document.getElementById('loginOverlay').style.display = 'flex';
}

function hideLogin() {
  document.getElementById('loginOverlay').style.display = 'none';
}

function toggleMode() {
  loginMode = loginMode === 'login' ? 'register' : 'login';
  var nameField = document.getElementById('loginName');
  var desc = document.getElementById('loginDesc');
  var loginBtn = document.querySelector('.login-btn');
  if (loginMode === 'register') {
    nameField.style.display = '';
    desc.textContent = 'ID・名前・パスワードを入力して新規登録';
    loginBtn.textContent = '新規登録';
    document.getElementById('loginToggleText').innerHTML = 'アカウントをお持ちの方は <a onclick="toggleMode()">ログイン</a>';
  } else {
    nameField.style.display = 'none';
    desc.textContent = 'IDとパスワードを入力してログイン';
    loginBtn.textContent = 'ログイン';
    document.getElementById('loginToggleText').innerHTML = 'はじめての方は <a onclick="toggleMode()">新規登録</a>';
  }
}

function doLogin() {
  var userId = document.getElementById('loginUserId').value.trim();
  var name = document.getElementById('loginName').value.trim();
  var pass = document.getElementById('loginPass').value.trim();
  var err = document.getElementById('loginErr');
  err.style.display = 'none';
  if (!userId) { err.style.display = 'block'; err.textContent = 'ユーザーIDを入力してください'; return; }
  if (!pass) { err.style.display = 'block'; err.textContent = 'パスワードを入力してください'; return; }
  if (loginMode === 'register' && !name) { err.style.display = 'block'; err.textContent = '名前を入力してください'; return; }

  var action = loginMode === 'register' ? 'register' : 'login';
  var body = {action: action, userId: userId, password: pass};
  if (action === 'register') body.name = name;

  var btn = document.querySelector('.login-btn');
  btn.disabled = true; btn.textContent = '処理中...';

  fetch('users.php', {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(body)
  }).then(function(r) { return r.json(); }).then(function(res) {
    if (res.success) {
      currentUserId = res.userId;
      currentUser = res.name;
      localStorage.setItem(STORE_USER_ID, res.userId);
      localStorage.setItem(STORE_USER, res.name);
      hideLogin();
      updateUserUI();
    } else {
      err.style.display = 'block';
      err.textContent = res.error || 'エラーが発生しました';
    }
  }).catch(function(e) {
    err.style.display = 'block';
    err.textContent = '通信エラー: ' + e.message;
  }).finally(function() {
    btn.disabled = false; btn.textContent = loginMode === 'register' ? '新規登録' : 'ログイン';
  });
}

function logout() {
  currentUser = null;
  currentUserId = null;
  localStorage.removeItem(STORE_USER);
  localStorage.removeItem(STORE_USER_ID);
  updateUserUI();
  showLogin();
}

function updateUserUI() {
  var el = document.getElementById('userName');
  var btn = document.getElementById('userBtn');
  if (currentUser) {
    el.textContent = currentUser;
    btn.textContent = 'ログアウト';
    btn.onclick = logout;
  } else {
    el.textContent = '未ログイン';
    btn.textContent = 'ログイン';
    btn.onclick = showLogin;
  }
}

function switchTab(tab) {
  document.getElementById('kiriSection').style.display = tab === 'kiri' ? '' : 'none';
  document.getElementById('homeSection').style.display = tab === 'home' ? '' : 'none';
  document.getElementById('navKiri').className = tab === 'kiri' ? 'active' : '';
  document.getElementById('navHome').className = tab === 'home' ? 'active' : '';
}

function loadConfig() {
  return fetch('course_config.json?t=' + Date.now())
    .then(function(r) { return r.json(); })
    .then(function(cfg) {
      if (cfg && cfg.steps) {
        allKiriSteps = cfg.steps.filter(function(s) { return s.phase === 'kirigaeshi'; });
        allHomeSteps = cfg.steps.filter(function(s) { return s.phase === 'homescript'; });
      }
    })
    .catch(function(e) {
      console.warn('Config load failed:', e);
    });
}

function renderKiri() {
  var container = document.getElementById('kiriList');
  container.innerHTML = '';
  if (allKiriSteps.length === 0 && kiriReports.length === 0) {
    container.innerHTML = '<p style="color:var(--text3);padding:20px">データがありません</p>';
    return;
  }

  // Build groups from scripts
  var groups = {};
  var groupOrder = [];
  allKiriSteps.forEach(function(s) {
    var g = s.group || 'その他';
    if (!groups[g]) { groups[g] = { scripts: [], reports: [] }; groupOrder.push(g); }
    groups[g].scripts.push(s);
  });

  // Map report genres to existing groups or create new ones
  var genreToGroup = {
    '料金・費用': '決済', '時間・忙しい': 'ヒアリング',
    '信頼性・実績': '高単価アフィリエイト', '副業・会社': 'ヒアリング',
    '家族・相談': 'マインドセット系の反論', '自信・不安': 'マインドセット系の反論',
    '競合・比較': 'クロージング', '契約・決済': '契約'
  };
  kiriReports.forEach(function(r) {
    var genre = r.genre || '未分類';
    var mapped = genreToGroup[genre] || null;
    var target = mapped && groups[mapped] ? mapped : null;
    if (!target) {
      // Try exact match
      if (groups[genre]) { target = genre; }
      else { target = '不明'; }
    }
    if (!groups[target]) { groups[target] = { scripts: [], reports: [] }; groupOrder.push(target); }
    groups[target].reports.push(r);
  });

  var prog = {};
  try { prog = JSON.parse(localStorage.getItem('kiri_loom_progress') || '{}'); } catch(e) {}
  var totalDone = 0;

  groupOrder.forEach(function(gName) {
    var grp = groups[gName];
    if (grp.scripts.length === 0 && grp.reports.length === 0) return;

    var gDiv = document.createElement('div');
    gDiv.className = 'kiri-group';

    var scriptCount = grp.scripts.length;
    var reportCount = grp.reports.length;
    var groupDone = grp.scripts.filter(function(s) {
      var k = 'kiri-' + s.title.replace(/\s/g, '_');
      return prog[k] && prog[k].memorized;
    }).length;

    var hdr = document.createElement('div');
    hdr.className = 'kiri-group-hdr';
    var cntText = groupDone + '/' + scriptCount;
    if (reportCount > 0) cntText += ' + 報告' + reportCount + '件';
    hdr.innerHTML = '<span class="chevron">▶</span><span>' + escHtml(gName) + '</span><span class="cnt">' + cntText + '</span>';
    hdr.onclick = function() { gDiv.classList.toggle('collapsed'); };
    gDiv.appendChild(hdr);

    var body = document.createElement('div');
    body.className = 'kiri-group-body';

    // Render existing scripts
    grp.scripts.forEach(function(step) {
      var key = 'kiri-' + step.title.replace(/\s/g, '_');
      var p = prog[key] || {};
      if (p.memorized) totalDone++;

      var item = document.createElement('div');
      item.className = 'kiri-item' + (step.desc ? '' : ' open');

      var titleClean = step.title.replace('の切り返しを覚えた', '');
      var titleDiv = document.createElement('div');
      titleDiv.className = 'kiri-item-title';
      titleDiv.innerHTML = '<span class="arrow">▶</span>' + escHtml(titleClean);
      titleDiv.onclick = function() { item.classList.toggle('open'); };
      item.appendChild(titleDiv);

      var bodyDiv = document.createElement('div');
      bodyDiv.className = 'kiri-item-body';

      if (step.desc) {
        var script = document.createElement('div');
        script.className = 'kiri-script';
        script.textContent = step.desc;
        bodyDiv.appendChild(script);
      }

      var actions = document.createElement('div');
      actions.className = 'kiri-actions';

      var memBtn = document.createElement('button');
      memBtn.className = 'memorized-btn' + (p.memorized ? ' done' : '');
      memBtn.textContent = p.memorized ? '✓ 覚えた！' : '覚えた！';
      memBtn.onclick = (function(k, btn) {
        return function(e) {
          e.stopPropagation();
          var pr = {};
          try { pr = JSON.parse(localStorage.getItem('kiri_loom_progress') || '{}'); } catch(x) {}
          pr[k] = pr[k] || {};
          pr[k].memorized = !pr[k].memorized;
          localStorage.setItem('kiri_loom_progress', JSON.stringify(pr));
          btn.classList.toggle('done');
          btn.textContent = pr[k].memorized ? '✓ 覚えた！' : '覚えた！';
          renderKiri();
        };
      })(key, memBtn);
      actions.appendChild(memBtn);

      if (p.loomUrl) {
        var sub = document.createElement('span');
        sub.className = 'loom-submitted';
        sub.textContent = '🎥 Loom提出済';
        actions.appendChild(sub);
      } else {
        var loomArea = document.createElement('div');
        loomArea.className = 'loom-area';
        var loomInput = document.createElement('input');
        loomInput.className = 'loom-input';
        loomInput.placeholder = 'Loom URLを貼る...';
        var loomBtn = document.createElement('button');
        loomBtn.className = 'loom-submit';
        loomBtn.textContent = '提出';
        loomBtn.onclick = (function(k, inp) {
          return function(e) {
            e.stopPropagation();
            var url = inp.value.trim();
            if (!url || url.indexOf('loom.com') < 0) { alert('Loom URLを入力してください'); return; }
            var pr = {};
            try { pr = JSON.parse(localStorage.getItem('kiri_loom_progress') || '{}'); } catch(x) {}
            pr[k] = pr[k] || {};
            pr[k].loomUrl = url;
            pr[k].submittedAt = new Date().toLocaleString('ja-JP');
            localStorage.setItem('kiri_loom_progress', JSON.stringify(pr));
            renderKiri();
          };
        })(key, loomInput);
        loomArea.appendChild(loomInput);
        loomArea.appendChild(loomBtn);
        actions.appendChild(loomArea);
      }

      bodyDiv.appendChild(actions);
      item.appendChild(bodyDiv);
      body.appendChild(item);
    });

    // Render reports within this group
    grp.reports.forEach(function(r) {
      var isCoach = r.answeredBy === 'coach';
      var rItem = document.createElement('div');
      rItem.className = 'kiri-report-item ' + (isCoach ? 'coach-done' : 'ai-only');

      var meta = document.createElement('div');
      meta.className = 'kiri-report-meta';
      meta.innerHTML = '<span class="kiri-report-badge ' + (isCoach ? 'coach' : 'ai') + '">' +
        (isCoach ? '✅ スクリプト準備済み' : '⏳ スクリプト準備中') + '</span>' +
        '<span class="kiri-report-user">' + escHtml(r.userName || '匿名') + '</span>' +
        '<span class="kiri-report-time">' + escHtml(r.timestamp || '') + '</span>';
      rItem.appendChild(meta);

      if (r.question) {
        var q = document.createElement('div');
        q.style.cssText = 'font-size:14px;color:var(--text);line-height:1.6;margin-bottom:8px;white-space:pre-wrap';
        q.textContent = r.question;
        rItem.appendChild(q);
      }

      if (r.answer) {
        var aDiv = document.createElement('div');
        aDiv.className = 'kiri-script';
        aDiv.style.borderLeftColor = isCoach ? '#4CAF50' : '#FF9800';
        aDiv.textContent = r.answer;
        rItem.appendChild(aDiv);
      }

      body.appendChild(rItem);
    });

    gDiv.appendChild(body);
    container.appendChild(gDiv);
  });

  var cntEl = document.getElementById('kiriCount');
  if (cntEl) cntEl.textContent = totalDone + '/' + allKiriSteps.length + ' 覚えた';
}

function renderHome() {
  var container = document.getElementById('homeList');
  container.innerHTML = '';
  if (allHomeSteps.length === 0) {
    container.innerHTML = '<p style="color:var(--text3);padding:20px">データがありません</p>';
    return;
  }
  allHomeSteps.forEach(function(step) {
    var item = document.createElement('div');
    item.className = 'home-item';
    var title = document.createElement('div');
    title.className = 'home-item-title';
    title.textContent = step.title;
    item.appendChild(title);
    if (step.desc) {
      var desc = document.createElement('div');
      desc.className = 'home-item-desc';
      desc.textContent = step.desc;
      item.appendChild(desc);
    }
    if (step.links && step.links.length) {
      step.links.forEach(function(lk) {
        var a = document.createElement('a');
        a.className = 'home-item-link';
        a.href = lk.url;
        a.target = '_blank';
        a.textContent = lk.label || 'リンクを開く';
        item.appendChild(a);
      });
    }
    container.appendChild(item);
  });
}

function submitReport() {
  var content = document.getElementById('rptContent').value.trim();
  var url = document.getElementById('rptUrl').value.trim();
  var part = document.getElementById('rptPart').value.trim();
  if (!content) { alert('「言われた内容」を入力してください'); return; }
  var btn = document.getElementById('rptBtn');
  var result = document.getElementById('rptResult');
  btn.disabled = true; btn.textContent = '送信中...';
  var msg = '【切り返せなかった質問の報告】\n言われた内容: 「' + content + '」\n動画URL: ' + (url || 'なし') + '\n該当部分: ' + (part || '未記入');
  fetch('ai_api.php', {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({type:'chat', category:'kirigaeshi', userName: currentUser || '匿名', message: msg})
  }).then(function(r) { return r.json(); }).then(function(res) {
    if (res.success) {
      result.style.display = 'block';
      result.innerHTML = '<div class="result-label">⚠️ AI素案（コーチ確認前）</div><div>' + escHtml(res.answer) + '</div>';
      document.getElementById('rptContent').value = '';
      document.getElementById('rptUrl').value = '';
      document.getElementById('rptPart').value = '';
      loadReports();
    } else { alert('エラー: ' + (res.error || 'unknown')); }
  }).catch(function(e) { alert('送信失敗: ' + e.message); })
  .finally(function() { btn.disabled = false; btn.textContent = '送信'; });
}

function submitJimu() {
  var content = document.getElementById('jimuContent').value.trim();
  var scene = document.getElementById('jimuScene').value.trim();
  if (!content) { alert('質問内容を入力してください'); return; }
  var btn = document.getElementById('jimuBtn');
  var result = document.getElementById('jimuResult');
  btn.disabled = true; btn.textContent = '送信中...';
  var msg = '【事務系の質問】\n質問: ' + content + '\n場面: ' + (scene || '未記入');
  fetch('ai_api.php', {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({type:'chat', category:'jimu', userName: currentUser || '匿名', message: msg})
  }).then(function(r) { return r.json(); }).then(function(res) {
    if (res.success) {
      result.style.display = 'block';
      result.innerHTML = '<div class="result-label">⚠️ AI素案（コーチ確認前）</div><div>' + escHtml(res.answer) + '</div>';
      document.getElementById('jimuContent').value = '';
      document.getElementById('jimuScene').value = '';
      loadJimuReports();
    } else { alert('エラー: ' + (res.error || 'unknown')); }
  }).catch(function(e) { alert('送信失敗: ' + e.message); })
  .finally(function() { btn.disabled = false; btn.textContent = '送信'; });
}

function loadReports() {
  fetch('get_kiri_reports.php?type=kirigaeshi').then(function(r) { return r.json(); }).then(function(data) {
    kiriReports = data.reports || [];
    renderKiri();
  }).catch(function(e) { console.warn('Reports load failed:', e); });
}

function loadJimuReports() {
  fetch('get_kiri_reports.php?type=jimu').then(function(r) { return r.json(); }).then(function(data) {
    var container = document.getElementById('jimuReports');
    container.innerHTML = '';
    var items = data.reports || [];
    if (Array.isArray(items) && items.length > 0) {
      var hdr = document.createElement('div');
      hdr.className = 'reports-header';
      hdr.innerHTML = '事務系の報告 <span class="reports-count">' + items.length + '件</span>';
      container.appendChild(hdr);
      items.forEach(function(r) {
        var card = document.createElement('div');
        card.className = 'report-card';
        card.innerHTML = '<div><span class="report-card-name">' + escHtml(r.userName || '匿名') + '</span><span class="report-card-time">' + escHtml(r.timestamp || '') + '</span></div>';
        if (r.question) { var q = document.createElement('div'); q.className = 'report-card-q'; q.textContent = r.question; card.appendChild(q); }
        if (r.answer) {
          var ab = r.answeredBy === 'coach' ? 'coach' : 'ai';
          var a = document.createElement('div'); a.className = 'report-card-a ' + ab;
          a.innerHTML = '<div class="report-card-a-label ' + ab + '">' + (ab === 'coach' ? '✅ コーチ回答' : '⚠️ AI素案') + '</div>';
          var t = document.createElement('div'); t.textContent = r.answer; a.appendChild(t);
          card.appendChild(a);
        }
        container.appendChild(card);
      });
    }
  }).catch(function(e) { console.warn('Jimu reports load failed:', e); });
}

function doSearch(val) {
  var q = val.trim().toLowerCase();
  var box = document.getElementById('searchResults');
  if (!q || q.length < 2) { box.style.display = 'none'; return; }
  var results = allKiriSteps.filter(function(s) {
    return (s.title && s.title.toLowerCase().indexOf(q) >= 0) || (s.desc && s.desc.toLowerCase().indexOf(q) >= 0);
  });
  if (results.length === 0) { box.style.display = 'none'; return; }
  box.style.display = '';
  box.innerHTML = '<div style="font-weight:700;margin-bottom:8px">検索結果: ' + results.length + '件</div>';
  results.forEach(function(s) {
    var d = document.createElement('div');
    d.style.cssText = 'padding:8px 0;border-bottom:1px solid var(--border);font-size:13px';
    d.innerHTML = '<strong>' + escHtml(s.title.replace('の切り返しを覚えた', '')) + '</strong>';
    if (s.desc) d.innerHTML += '<div style="color:var(--text2);margin-top:4px;white-space:pre-wrap;font-size:12px">' + escHtml(s.desc.substring(0, 200)) + '...</div>';
    box.appendChild(d);
  });
}

// Init
updateUserUI();
if (!currentUserId) showLogin();

loadConfig().then(function() {
  renderKiri();
  renderHome();
  loadReports();
  loadJimuReports();
  if (location.hash === '#home') switchTab('home');
});
</script>
